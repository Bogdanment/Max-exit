version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: exit_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - exit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  api:
    build: ./backend
    container_name: exit_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: exit_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - exit-network
    command: npm run dev

  # React Frontend (optional, можно запустить отдельно)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: exit_frontend
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://api:5000/api
    networks:
      - exit-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  exit-network:
    driver: bridge
