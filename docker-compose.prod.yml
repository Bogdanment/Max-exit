services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: exit_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-exit_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - exit-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exit_api_prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-5000}
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-exit_db}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5000:5000"
    networks:
      - exit-network
    restart: always
    command: npm start

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: exit_frontend_prod
    depends_on:
      - api
    ports:
      - "3000:3001"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://159.223.20.99:5000/api}
    networks:
      - exit-network
    restart: always

volumes:
  postgres_data:

networks:
  exit-network:
    driver: bridge
